name: Renew YouTube PubSubHubbub Subscription

on:
  # Ejecutar cada 4 días a las 9am UTC (1 día antes de que caduquen los 5 días de lease)
  schedule:
    - cron: '0 9 */4 * *'
  # Permitir ejecución manual desde GitHub → Actions → Run workflow
  workflow_dispatch:

jobs:
  renew:
    name: Renew PubSubHubbub Subscription
    runs-on: ubuntu-latest

    steps:
      - name: Subscribe / Renew
        run: |
          echo "🔄 Renovando suscripción PubSubHubbub de YouTube..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST 'https://pubsubhubbub.appspot.com/subscribe' \
            -d 'hub.callback=https://links.sofidev.blog/api/youtube-webhook' \
            -d 'hub.topic=https://www.youtube.com/xml/feeds/videos.xml?channel_id=UC36_js-krsAHAEAWpEDhHtw' \
            -d 'hub.verify=async' \
            -d 'hub.mode=subscribe' \
            -d 'hub.lease_seconds=432000' \
            -d "hub.secret=${{ secrets.YT_SECRET }}")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)

          if [ "$HTTP_STATUS" = "202" ]; then
            echo "✅ Suscripción renovada correctamente (202 Accepted)."
            echo "   Próxima expiración: en 5 días."
          else
            echo "❌ Falló la renovación. HTTP status: $HTTP_STATUS"
            echo "$RESPONSE"
            exit 1
          fi
