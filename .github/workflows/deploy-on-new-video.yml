name: Deploy on New YouTube Video

on:
  repository_dispatch:
    types: [youtube-new-video]

jobs:
  deploy:
    name: Trigger Vercel Rebuild
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          echo "🎬 Nuevo video detectado — disparando rebuild en Vercel..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")

          if [ "$RESPONSE" = "201" ]; then
            echo "✅ Deploy hook disparado correctamente (201)."
          else
            echo "❌ Falló el deploy hook. HTTP status: $RESPONSE"
            exit 1
          fi
